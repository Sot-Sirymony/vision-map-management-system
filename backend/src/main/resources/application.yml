spring:
  application:
    name: vision-mapping-backend
  profiles:
    active: local

server:
  port: ${PORT:8080}

app:
  security:
    jwt-secret: ${JWT_SECRET:vision-mapping-development-secret-key-change-before-production}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}

---
spring:
  config:
    activate:
      on-profile: local
  # FR-30: caching is opt-in — the app runs uncached (exactly as before) unless
  # CACHE_TYPE=redis is set. Short timeouts keep a dead Redis cheap: failures
  # degrade to cache misses (BR-21), never to failed requests.
  cache:
    type: ${CACHE_TYPE:none}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 500ms
      connect-timeout: 500ms
  datasource:
    url: jdbc:postgresql://localhost:5432/vision_mapping
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

---
spring:
  config:
    activate:
      on-profile: prod
  # FR-30: render.yaml enables the cache by setting CACHE_TYPE=redis and
  # injecting REDIS_URL from the Key Value service. Without them the backend
  # boots and behaves exactly as before (FR-30 AC-3).
  cache:
    type: ${CACHE_TYPE:none}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 500ms
      connect-timeout: 500ms
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

---
spring:
  config:
    activate:
      on-profile: test
  # FR-30: an in-memory cache lets the caching, key-scoping, and eviction
  # tests run without a Redis server.
  cache:
    type: simple
  datasource:
    url: jdbc:h2:mem:vision_mapping_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
